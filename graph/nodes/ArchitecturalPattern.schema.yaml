$schema: "https://json-schema.org/draft/2020-12/schema"
title: Architectural Pattern Node
version: "1.0"
type: object
required: [id, type, name, summary, domain, status, confidence, version, created, updated, source_files]
properties:
  id: {type: string, pattern: "^PAT-[0-9]{3}$"}
  type: {const: ArchitecturalPattern}
  name: {type: string, minLength: 3}
  summary: {type: string, minLength: 10}
  domain: {type: string, pattern: "^DOM-[0-9]{3}$"}
  status: {enum: [active, deprecated]}
  confidence: {enum: [experimental, provisional, verified, deprecated]}
  version: {type: string, pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"}
  created: {type: string, format: date}
  updated: {type: string, format: date}
  source_files: {type: array, items: {type: string, minLength: 3}, minItems: 1}
