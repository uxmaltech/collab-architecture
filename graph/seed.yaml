  - id: ADR-001
    type: Decision
    name: Canonical Knowledge Representation
    decision: The canonical representation of architectural knowledge SHALL be stored in files that can be compiled into both a knowledge graph and a vector index.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/decisions/ADR-001-canonical-representation.md]

  - id: ADR-002
    type: Decision
    name: Strict CQRS in Backend CBQ
    decision: The Backend CBQ domain SHALL implement strict CQRS separation with independent command and query models, materialized read stores, and versioned query routing.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/decisions/ADR-002-strict-cqrs-backend.md]

  - id: ADR-003
    type: Decision
    name: Non-Canonical Tables for Small Static Lists
    decision: Non-canonical client-side tables are permitted only for small static datasets without server-side pagination, sorting, or filtering.
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [knowledge/decisions/ADR-003-non-canonical-tables.md]

  - id: ADR-004
    type: Decision
    name: Third-Party UI Widgets Under Contract Wrappers
    decision: Third-party UI widgets are permitted only when wrapped by contract-emitting components, use runtime events, and enforce server-side validation and declared asset loading.
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [knowledge/decisions/ADR-004-third-party-ui-widgets.md]

  - id: ADR-005
    type: Decision
    name: V2 Context Topology (Tools + Stores)
    decision: V2 tools query architecture by context/scope with N+1 Qdrant collections (technical-{scope} per scope + business-rules) and 2 Nebula spaces (technical_architecture, business_architecture).
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-24
    updated: 2026-02-24
    source_files: [knowledge/decisions/ADR-005-v2-context-topology.md]

