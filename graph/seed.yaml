  - id: RL-001
    type: Rule
    name: BO-R-008 Public Runtime API Only
    rule: UI integrations MUST use only the public UI runtime API; internal runtime state and private symbols MUST NOT be accessed.
    domain: DOM-001
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/rules.md]

  - id: RL-002
    type: Rule
    name: BO-R-009 Event-Driven Readiness
    rule: Component readiness MUST be driven by runtime lifecycle events or explicit wait APIs; polling or timer-based retries MUST NOT be used.
    domain: DOM-001
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/rules.md]

  - id: RL-003
    type: Rule
    name: BO-R-010 Reinitialize After DOM Injection
    rule: Any dynamic DOM injection MUST invoke runtime re-initialization for the affected scope to rebind components, actions, and assets.
    domain: DOM-001
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/rules.md]

  - id: RL-004
    type: Rule
    name: BO-R-011 Declarative Asset Dependencies
    rule: Server-rendered views MUST declare component asset dependencies; the runtime MUST lazy-load assets from that declaration only.
    domain: DOM-001
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/rules.md]

  - id: RL-005
    type: Rule
    name: BO-R-012 Sanitize External HTML
    rule: User-supplied or external HTML MUST be sanitized or escaped before rendering; raw HTML injection MUST NOT occur.
    domain: DOM-001
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/rules.md]

  - id: RL-006
    type: Rule
    name: CL-R-006 Registry-Only Contract Invocation
    rule: UI-to-backend requests MUST be executed via the named-route registry and contract client; direct HTTP calls that bypass contract validation MUST NOT be used.
    domain: DOM-003
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/cross-layer/rules.md]

  - id: CN-001
    type: Convention
    name: Canonical Naming
    rule: Single-entry canonical documents under knowledge/ MUST use kebab-case filenames that begin with their stable ID. IDs MUST be unique within their category and MUST appear in the document title.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/conventions/CN-001-naming.md]

  - id: CN-002
    type: Convention
    name: Canonical Versioning
    rule: All versioned artifacts in the canon MUST use semantic versioning in the form vMAJOR.MINOR.PATCH. Breaking changes require a MAJOR increment and a migration guide.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/conventions/CN-002-versioning.md]

  - id: AP-001
    type: AntiPattern
    name: Architecture Embedded Only in Code
    rule: No architectural rule is valid if it exists only in application code or in team conventions outside this repository.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/anti-patterns/AP-001-architecture-in-code.md]

  - id: AP-002
    type: AntiPattern
    name: Implicit Contracts
    rule: Implicit or undocumented contracts between UI and backend are forbidden. Every cross-layer contract MUST be explicit and versioned.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/anti-patterns/AP-002-implicit-contracts.md]

  - id: AP-003
    type: AntiPattern
    name: Unreviewed Exceptions
    rule: Exceptions to canonical rules are invalid unless recorded as an architectural decision with an explicit expiration or replacement plan.
    status: active
    confidence: verified
    version: v1.0.0
    created: 2026-02-02
    updated: 2026-02-02
    source_files: [knowledge/anti-patterns/AP-003-unreviewed-exceptions.md]

  - id: AP-004
    type: AntiPattern
    name: BO-AP-006 Internal Runtime Access
    rule: Accessing internal UI runtime state or private symbols from application code.
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/anti-patterns.md]

  - id: AP-005
    type: AntiPattern
    name: BO-AP-007 Polling for Readiness
    rule: Polling or timer-based readiness checks instead of lifecycle events or explicit wait APIs.
    status: active
    confidence: provisional
    version: v1.0.0
    created: 2026-02-05
    updated: 2026-02-05
    source_files: [domains/backoffice-ui/anti-patterns.md]

