name: Publish MCP Collab Image

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ${{ (!github.event.act) && fromJSON('["self-hosted","uxmaltech"]') || 'ubuntu-latest' }}
    permissions:
      contents: read
    env:
      DOCKER_REGISTRY_URL: ${{ vars.DOCKER_REGISTRY_URL }}
      IMAGE_NAME: collab-architecture/mcp-collab
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 5
          fetch-tags: true

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}'. Expected format: vX.Y.Z or vX.Y.Z-prerelease"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./tools/mcp-collab
          file: ./tools/mcp-collab/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.DOCKER_REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
